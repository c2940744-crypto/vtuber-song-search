<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VTuber セットリスト検索</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --card: #1a1a2e;
    --border: #2a2a45;
    --accent: #c084fc;
    --accent2: #f0abfc;
    --accent3: #818cf8;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-faint: #475569;
    --glow: rgba(192, 132, 252, 0.15);
    --glow-strong: rgba(192, 132, 252, 0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(129, 140, 248, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(129, 140, 248, 0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Top gradient blob */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(192, 132, 252, 0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left { flex: 1; }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--accent);
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 12px;
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 0 0 var(--glow); }
    50% { box-shadow: 0 0 12px 2px var(--glow-strong); }
  }

  h1 {
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 900;
    line-height: 1.15;
    background: linear-gradient(135deg, #f0abfc 0%, #818cf8 60%, #c084fc 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.02em;
  }

  /* Language Switcher */
  .lang-switcher {
    display: flex;
    gap: 6px;
    background: var(--surface);
    padding: 5px;
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .lang-btn {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .lang-btn.active {
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    color: white;
    box-shadow: 0 2px 12px rgba(124, 58, 237, 0.4);
  }

  .lang-btn:hover:not(.active) {
    color: var(--text);
    background: var(--border);
  }

  /* Search Panel */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), var(--accent3), transparent);
  }

  .field-group {
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  .input-wrap {
    position: relative;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-faint);
    font-size: 16px;
    pointer-events: none;
    transition: color 0.2s;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px 14px 46px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.25s ease;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  input[type="text"]:focus + .focus-ring,
  .input-wrap:focus-within .input-icon {
    color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--text-faint); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .channel-filter-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .channel-filter-row label { margin-bottom: 0; flex-shrink: 0; }

  .channel-filter-row input {
    flex: 1;
  }

  /* Channel grid */
  .channel-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 6px;
    max-height: 220px;
    overflow-y: auto;
    padding: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-track { background: transparent; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .channel-chip {
    font-size: 12px;
    font-weight: 400;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-align: left;
    width: 100%;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .channel-chip:hover {
    border-color: var(--accent3);
    color: var(--text);
    background: rgba(129, 140, 248, 0.1);
  }

  .channel-chip.selected {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(192, 132, 252, 0.15), rgba(129, 140, 248, 0.15));
    color: var(--accent2);
    box-shadow: 0 0 10px var(--glow);
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 14px 20px;
    border: none;
    border-radius: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
    letter-spacing: 0.02em;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:active::after { opacity: 0.08; }

  .btn-primary {
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    color: white;
    box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 28px rgba(124, 58, 237, 0.5);
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    color: var(--text);
    border-color: var(--accent3);
    background: rgba(129, 140, 248, 0.08);
  }

  /* Status bar */
  .status-bar {
    margin-top: 28px;
    height: 0;
    overflow: hidden;
    transition: height 0.3s ease;
  }

  .status-bar.visible { height: 50px; }

  .status-inner {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-dim);
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results-section {
    margin-top: 32px;
  }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .results-title {
    font-size: 13px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .results-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(192, 132, 252, 0.1);
    border: 1px solid rgba(192, 132, 252, 0.3);
    padding: 3px 12px;
    border-radius: 100px;
  }

  .channel-group {
    margin-bottom: 20px;
    animation: fadeSlideIn 0.35s ease forwards;
    opacity: 0;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .channel-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px 12px 0 0;
    border-bottom: none;
  }

  .channel-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #ec4899);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    font-weight: 900;
  }

  .channel-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    flex: 1;
  }

  .channel-count-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent3);
    background: rgba(129, 140, 248, 0.1);
    border: 1px solid rgba(129, 140, 248, 0.25);
    padding: 2px 9px;
    border-radius: 100px;
  }

  .song-list {
    border: 1px solid var(--border);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }

  .song-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 18px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s ease;
    text-decoration: none;
    color: inherit;
  }

  .song-item:last-child { border-bottom: none; }

  .song-item:hover {
    background: rgba(192, 132, 252, 0.06);
  }

  .song-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    min-width: 20px;
    text-align: right;
  }

  .song-name {
    flex: 1;
    font-size: 14px;
    font-weight: 400;
    color: var(--text);
  }

  .song-link-icon {
    color: var(--accent3);
    font-size: 15px;
    opacity: 0.6;
    transition: opacity 0.15s, transform 0.15s;
  }

  .song-item:hover .song-link-icon {
    opacity: 1;
    transform: translateX(2px);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-faint);
  }

  .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }

  /* Sync button */
  .sync-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 28px;
  }

  .sync-btn:hover { color: var(--text-dim); border-color: var(--accent3); }
  .sync-btn.syncing { color: var(--accent); border-color: var(--accent); }

  .sync-dot {
    width: 6px; height: 6px;
    background: var(--text-faint);
    border-radius: 50%;
    transition: background 0.2s;
  }

  .sync-btn:hover .sync-dot { background: var(--accent3); }
  .sync-btn.syncing .sync-dot {
    background: var(--accent);
    animation: blink 1s infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }


  /* Progress bar */
  .progress-wrap {
    margin-top: 12px;
    display: none;
  }
  .progress-wrap.visible { display: block; }
  .progress-track {
    height: 4px;
    background: var(--border);
    border-radius: 100px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #7c3aed, #c084fc, #818cf8);
    border-radius: 100px;
    transition: width 0.3s ease;
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite linear;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    display: flex;
    justify-content: space-between;
  }
  .progress-label span { color: var(--accent); }


  /* Search mode switcher */
  .mode-switcher {
    display: flex;
    gap: 6px;
    background: var(--surface);
    padding: 5px;
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .mode-btn {
    flex: 1;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 12px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s ease;
  }
  .mode-btn.active {
    background: linear-gradient(135deg, #7c3aed, #6366f1);
    color: white;
    box-shadow: 0 2px 12px rgba(124, 58, 237, 0.4);
  }
  .mode-btn:hover:not(.active) {
    color: var(--text);
    background: var(--border);
  }

  /* Cover badge on song items */
  .cover-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 100px;
    background: linear-gradient(135deg, rgba(236,72,153,0.2), rgba(192,132,252,0.2));
    border: 1px solid rgba(236,72,153,0.4);
    color: #f0abfc;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .setlist-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 100px;
    background: rgba(129,140,248,0.15);
    border: 1px solid rgba(129,140,248,0.3);
    color: var(--accent3);
    flex-shrink: 0;
    white-space: nowrap;
  }
  /* Cover group header highlight */
  .channel-group.is-cover .channel-header {
    background: linear-gradient(135deg, rgba(236,72,153,0.08), rgba(192,132,252,0.08));
    border-color: rgba(236,72,153,0.25);
  }
  .channel-group.is-cover .channel-count-badge {
    background: rgba(236,72,153,0.15);
    border-color: rgba(236,72,153,0.3);
    color: #f0abfc;
  }


  /* Romaji match badge */
  .romaji-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 100px;
    background: rgba(100,116,139,0.15);
    border: 1px solid rgba(100,116,139,0.3);
    color: var(--text-faint);
    flex-shrink: 0;
    white-space: nowrap;
  }


  /* Help modal */
  .help-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .help-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    width: 100%;
    max-width: 560px;
    max-height: 80vh;
    overflow-y: auto;
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    animation: fadeSlideIn 0.25s ease forwards;
  }
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 28px 16px;
    position: sticky;
    top: 0;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    z-index: 1;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 900;
    background: linear-gradient(135deg, #f0abfc, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }
  .modal-body {
    padding: 20px 28px 28px;
  }
  .help-section {
    margin-bottom: 22px;
  }
  .help-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .help-item {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-dim);
  }
  .help-icon {
    font-size: 16px;
    flex-shrink: 0;
    width: 20px;
    text-align: center;
  }
  .help-item strong { color: var(--text); }


  .song-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    flex-shrink: 0;
    white-space: nowrap;
    margin-left: auto;
  }


  .no-result-tips {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    text-align: left;
    max-width: 380px;
  }
  .no-result-tip {
    font-size: 13px;
    color: var(--text-faint);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    line-height: 1.5;
  }


  .song-hint {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 5px;
    padding-left: 4px;
  }

  /* Responsive */
  @media (max-width: 540px) {
    .panel { padding: 20px 16px; }
    .btn-row { flex-direction: column; }
    .channel-list { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    .header { margin-bottom: 28px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="badge" id="badge">VTuber Search</div>
      <h1 id="h1">🎤 VTuber セットリスト検索</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="help-btn" onclick="toggleHelp()" title="使い方">?</button>
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ja')">日本語</button>
        <button class="lang-btn" onclick="setLang('zh')">繁體中文</button>
        <button class="lang-btn" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>

  <!-- Sync button -->

// Initialise kuromoji in background (dict loads ~2s)
// kuromoji 已移除：romaji 資料存於第9欄，不需要即時轉換




// Convert a song title to romaji using kuromoji readings
function songToRomaji(title) {
  if (!kuromojiTokenizer) return null;
  try {
    const tokens = kuromojiTokenizer.tokenize(title);
    return tokens.map(t => {
      const reading = t.reading || t.surface_form;
      return hiraToRomaji(kataToHira(reading));
    }).join('').toLowerCase();
  } catch(e) {
    return null;
  }
}

// Check if query (romaji) matches song title via kuromoji
// Returns match index in romaji string, or -1 if no match
// Strict: no English letters before/after match in ORIGINAL title region
function romajiMatch(query, song) {
  if (!kuromojiTokenizer) return -1;
  const q = query.toLowerCase();

  // キャッシュから取得（なければリアルタイム変換）
  let romajiStr = romajiCache.get(song);
  if (!romajiStr) {
    // キャッシュにない場合はセグメント方式でリアルタイム変換
    let tokens;
    try { tokens = kuromojiTokenizer.tokenize(song); }
    catch(e) { return -1; }
    const segments = tokens.map(t => {
      const surface = t.surface_form;
      const hasJP = /[\u3040-\u30ff\u4e00-\u9fff]/.test(surface);
      if (!hasJP) return null;
      const reading = t.reading || surface;
      return hiraToRomaji(kataToHira(reading)).toLowerCase();
    }).filter(Boolean);
    romajiStr = segments.join('');
    if (romajiStr) romajiCache.set(song, romajiStr);
  }

  if (!romajiStr) return -1;
  const idx = romajiStr.indexOf(q);
  if (idx === -1) return -1;

  // 前後に英字がないか確認
  const before = romajiStr[idx - 1];
  const after  = romajiStr[idx + q.length];
  if (before && /[a-z]/i.test(before)) return -1;
  if (after  && /[a-z]/i.test(after))  return -1;

  return idx;
}



// ============================================================
// SCORING
// ============================================================

// Score a setlist result for sorting (lower = better rank)
// Returns { tier, pos }
// tier 1 = exact word boundary match
// tier 2 = substring match
// tier 3 = romaji match
function scoreResult(query, song) {
  const queryClean = cleanText(query);
  const songLower  = song.toLowerCase();

  // Find raw match position in original (un-cleaned) song string
  const rawIdx = songLower.indexOf(queryClean);

  if (rawIdx !== -1) {
    // Check word boundary: chars before/after must NOT be \w / CJK / kana
    const wordCharsRe = /[\w\u4e00-\u9fff\u3040-\u30ff]/;
    const charBefore = song[rawIdx - 1];
    const charAfter  = song[rawIdx + queryClean.length];
    const boundaryOk = (!charBefore || !wordCharsRe.test(charBefore)) &&
                       (!charAfter  || !wordCharsRe.test(charAfter));
    if (boundaryOk) return { tier: 1, pos: rawIdx };
    return { tier: 2, pos: rawIdx };
  }

  return { tier: 2, pos: 9999 };
}

async function fetchWithProgress(url, label) {
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      console.log(`[attempt ${attempt}] fetching: ${url}`);
      const r = await fetch(url);
      console.log(`[attempt ${attempt}] status: ${r.status}, ok: ${r.ok}`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);

      const contentLength = r.headers.get('content-length');
      const total = contentLength ? parseInt(contentLength) : null;
      const reader = r.body.getReader();
      const chunks = [];
      let received = 0;

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        chunks.push(value);
        received += value.length;
        if (total) {
          showProgress(label, (received / total) * 100);
        } else {
          // No content-length: animate based on received MB
          const mb = (received / 1024 / 1024).toFixed(1);
          showProgress(`${label}　${mb} MB`, Math.min(90, received / 300000));
        }
      }

      const allChunks = new Uint8Array(received);
      let position = 0;
      for (const chunk of chunks) {
        allChunks.set(chunk, position);
        position += chunk.length;
      }
      const text = new TextDecoder('utf-8').decode(allChunks);
      if (text.length > 10) return text;

    } catch(e) {
      console.error(`[attempt ${attempt}] error:`, e.message, e);
      if (attempt < 3) {
        showProgress(`重試中 (${attempt}/3)...`, 0);
        await new Promise(res => setTimeout(res, 1500 * attempt));
      }
    }
  }
  throw new Error('Failed after 3 attempts');
}

async function fetchWithProxy(url) {

async function syncData() {
  const btn = document.getElementById('syncBtn');
  const lbl = document.getElementById('syncLabel');
  const dot = document.getElementById('syncDot');
  btn.classList.add('syncing');
  lbl.textContent = L().syncing;
  showStatus(L().syncing, true); // 最多重試3次，每次間隔1.5秒

  try {
    // 一個一個下載，避免搶頻寬
    showProgress('vtuber_list.txt 下載中...', 0);
    const vtuberRaw = await fetchWithProgress(DROPBOX_VTUBERS, 'vtuber_list.txt');
    showProgress('setlist_cache.txt 下載中...', 0);
    const setlistRaw = await fetchWithProgress(DROPBOX_SETLIST, 'setlist_cache.txt');
    showProgress('cover_cache.txt 下載中...', 0);
    const coverRaw = await fetchWithProgress(DROPBOX_COVER, 'cover_cache.txt');

    // Parse vtubers
    vtuberData = {};
    vtuberRaw.split('\n').forEach(line => {
      const parts = line.split(' | ');
      if (parts.length >= 3) {
        vtuberData[parts[0].trim()] = { name: parts[1].trim(), url: parts[2].trim() };
      }
    });

    // Parse setlist & cover lines (keep in memory only)
    setlistLines = setlistRaw.split('\n').filter(l => l.trim());

    coverLines   = coverRaw.split('\n').filter(l => l.trim());

    // Only store vtuberData (small) in localStorage
    localStorage.setItem('vtuberData', JSON.stringify(vtuberData));
    localStorage.setItem('syncTime', Date.now());
    localStorage.setItem('syncSuccess', '1');

    await refreshClickCounts(); // clickCounts + channelTotalClicks
    renderChannelChips();
    hideStatus();
    btn.classList.remove('syncing');
    hideProgress();
    lbl.textContent = `✓ ${L().syncDone} (${Object.keys(vtuberData).length})`;
    setTimeout(() => { lbl.textContent = L().syncLabel; }, 3000);

  } catch(e) {
    console.error('syncData failed:', e);
    hideStatus();
    btn.classList.remove('syncing');
    hideProgress();
    lbl.textContent = `✗ ${L().syncFail}: ${e.message}`;
    setTimeout(() => { lbl.textContent = L().syncLabel; }, 3000);
    loadFromCache();
  }
}

function loadFromCache() {
  const vd = localStorage.getItem('vtuberData');
  if (vd) vtuberData = JSON.parse(vd);
  renderChannelChips();

  const syncTime = localStorage.getItem('syncTime');
  if (syncTime) {
    const d = new Date(+syncTime);
    document.getElementById('syncLabel').textContent = `cached ${d.toLocaleDateString()}`;
  }
}

// ============================================================
// CHANNEL CHIPS
// ============================================================

function renderChannelChips() {
  const filter = document.getElementById('channelFilter').value.toLowerCase();
  const container = document.getElementById('channelList');
  container.innerHTML = '';

  // All chip
  const allChip = document.createElement('button');
  allChip.className = 'channel-chip' + (selectedChannelIdss.has('ALL') ? ' selected' : '');
  allChip.dataset.id = 'ALL';
  allChip.textContent = L().allVtubers;
  allChip.onclick = () => selectChannel('ALL', allChip);
  container.appendChild(allChip);

  // Individual channels
  const sorted = Object.entries(vtuberData).sort((a, b) =>
    (channelTotalClicks[b[0]] || 0) - (channelTotalClicks[a[0]] || 0)
  );

  for (const [id, info] of sorted) {
    if (filter && !info.name.toLowerCase().includes(filter)) continue;
    const chip = document.createElement('button');
    chip.className = 'channel-chip' + (selectedChannelIdss.has(id) ? ' selected' : '');
    chip.dataset.id = id;
    chip.textContent = info.name;
    chip.title = info.name;
    chip.onclick = () => selectChannel(id, chip);
    container.appendChild(chip);
  }
}

function selectChannel(id, el) {
  if (id === 'ALL') {
    // 點全選 → 清除其他選擇
    selectedChannelIdss = new Set(['ALL']);
  } else {
    selectedChannelIdss.delete('ALL');
    if (selectedChannelIdss.has(id)) {
      selectedChannelIdss.delete(id);
      if (selectedChannelIdss.size === 0) selectedChannelIdss.add('ALL'); // 全部取消 → 回到全選
    } else {
      selectedChannelIdss.add(id);
    }
  }
  // 更新 chip 樣式
  document.querySelectorAll('.channel-chip').forEach(c => {
    const chipId = c.dataset.id;
    c.classList.toggle('selected', selectedChannelIdss.has(chipId));
  });
}

function filterChannels() {
  renderChannelChips();
}

function onSongInput() {
  // nothing live – search on button click
}

// ============================================================
// SEARCH
// ============================================================

function cleanText(s) {
  return s.toLowerCase()
    .replace(/\s+/g, '')
    .replace(/[^\w\u4e00-\u9fff\u3040-\u30ff]/g, '');
}

function doSearch() {
  const query = document.getElementById('songInput').value.trim();
  if (!query) return;

  showStatus(L().searching, true);

  setTimeout(() => {
    const queryClean = cleanText(query);
    const results = [];
    const seen = new Set();

    // 搜尋 setlist
    if (searchMode === 'all' || searchMode === 'setlist') {
      for (const line of setlistLines) {
        const parts = line.split(' | ');
        if (parts.length !== 7 && parts.length !== 9) continue;
        const cid    = parts[0].trim();
        const vUrl   = parts[1].trim();
        const sec    = parts[4].trim();
        const song   = parts[6].trim();
        const date   = parts.length === 9 ? parts[7].trim() : '';
        const romaji = parts.length === 9 ? parts[8].trim() : '';

        if (!selectedChannelIdss.has('ALL') && !selectedChannelIdss.has(cid)) continue;

        // 文字匹配
        const isTextMatch = cleanText(song).includes(queryClean);

        // 羅馬拼音匹配：直接用第9欄的 romaji
        let rIdx = -1;
        if (romaji && romaji.indexOf(queryClean) !== -1) {
          const ri = romaji.indexOf(queryClean);
          const before = romaji[ri - 1], after = romaji[ri + queryClean.length];
          if (!(before && /[a-z]/i.test(before)) && !(after && /[a-z]/i.test(after))) {
            rIdx = ri;
          }
        }

        if (!isTextMatch && rIdx === -1) continue;

        const finalUrl = vUrl.includes('?') ? `${vUrl}&t=${sec}s` : `${vUrl}?t=${sec}s`;
        if (!seen.has(finalUrl)) {
          seen.add(finalUrl);
          // 文字匹配優先，羅馬字匹配為輔（tier 3）
          const score = isTextMatch ? scoreResult(query, song) : { tier: 3, pos: rIdx };
          results.push({ cid, url: finalUrl, song, date, type: 'setlist', score });
        }
      }
    }

    // 搜尋 cover
    if (searchMode === 'all' || searchMode === 'cover') {
      for (const line of coverLines) {
        const parts = line.split(' | ');
        if (parts.length !== 5) continue;
        const [cid, vUrl, , song] = parts.map(s => s.trim());
        if (!selectedChannelIdss.has('ALL') && !selectedChannelIdss.has(cid)) continue;
        if (!cleanText(song).includes(queryClean)) continue;
        if (!seen.has(vUrl)) {
          seen.add(vUrl);
          results.push({ cid, url: vUrl, song, type: 'cover', score: { tier: 0, pos: 0 } });
        }
      }
    }

    // 排序：cover 置頂 → 熱門度（點擊數）→ tier → pos
    function getVideoIdFromUrl(url) {
      const m = url.match(/(?:v=|youtu\.be\/)([0-9A-Za-z_-]{11})/);
      return m ? m[1] : url;
    }
    results.sort((a, b) => {
      if (a.type !== b.type) return a.type === 'cover' ? -1 : 1;
      const clickA = clickCounts[getVideoIdFromUrl(a.url)] || 0;
      const clickB = clickCounts[getVideoIdFromUrl(b.url)] || 0;
      if (clickA !== clickB) return clickB - clickA; // 熱門度高排前面
      if (a.score.tier !== b.score.tier) return a.score.tier - b.score.tier;
      return a.score.pos - b.score.pos;
    });

    hideStatus();
    renderResults(results);
  }, 30);
}

function renderResults(results) {
  const section = document.getElementById('resultsSection');
  const body = document.getElementById('resultsBody');
  const title = document.getElementById('resultsTitle');
  const count = document.getElementById('resultsCount');

  if (!results.length) {
    section.style.display = 'block';
    title.textContent = L().resultsTitle;
    count.textContent = '0';
    body.innerHTML = `<div class="empty-state">
      <span class="emoji">😢</span>
      <p>${L().noResult}</p>
      <div class="no-result-tips">
        ${L().noResultTips.map(t => `<div class="no-result-tip">${t}</div>`).join('')}
      </div>
    </div>`;
    return;
  }

  // Group by channel
  const grouped = {};
  for (const r of results) {
    if (!grouped[r.cid]) grouped[r.cid] = [];
    grouped[r.cid].push(r);
  }

  const channelCount = Object.keys(grouped).length;
  section.style.display = 'block';
  title.textContent = L().resultsTitle;
  count.textContent = L().totalResults(results.length, channelCount);

  // 頻道依總點擊數排序（cover 頻道永遠在前）
  function getVideoIdFromUrl(url) {
    const m = url.match(/(?:v=|youtu\.be\/)([0-9A-Za-z_-]{11})/);
    return m ? m[1] : url;
  }
  const sortedGroups = Object.entries(grouped).sort(([, aItems], [, bItems]) => {
    const aIsCover = aItems[0].type === 'cover';
    const bIsCover = bItems[0].type === 'cover';
    if (aIsCover !== bIsCover) return aIsCover ? -1 : 1;
    const aClicks = aItems.reduce((s, i) => s + (clickCounts[getVideoIdFromUrl(i.url)] || 0), 0);
    const bClicks = bItems.reduce((s, i) => s + (clickCounts[getVideoIdFromUrl(i.url)] || 0), 0);
    return bClicks - aClicks;
  });

  body.innerHTML = '';
  let delay = 0;
  for (const [cid, items] of sortedGroups) {
    const info = vtuberData[cid] || { name: `Unknown (${cid})`, url: '' };
    const initial = info.name.charAt(0).toUpperCase();

    const group = document.createElement('div');
    group.className = 'channel-group';
    group.style.animationDelay = `${delay}ms`;

    const isCoverGroup = items.every(i => i.type === 'cover');
    const isSetlistGroup = items.every(i => i.type === 'setlist');

    const songsHtml = items.map((item, i) => {
      let badge = '';
      // Romaji match indicator（最前面）
      if (item.type === 'setlist' && item.score && item.score.tier === 3) {
        badge = `<span class="romaji-badge">ローマ字</span>`;
      }
      // Cover badge
      if (item.type === 'cover') {
        badge += `<span class="cover-badge">Cover</span>`;
      }
      // setlist badge
      if (item.type === 'setlist') {
        badge += `<span class="setlist-badge">歌枠</span>`;
      }
      const vid = (item.url.match(/(?:v=|youtu\.be\/)([0-9A-Za-z_-]{11})/) || [])[1] || '';
      const dateStr = item.date
        ? `<span class="song-date">${item.date.slice(0,4)}.${item.date.slice(4,6)}.${item.date.slice(6,8)}</span>`
        : '';
      return `
        <a class="song-item" href="${escapeHtml(item.url)}" target="_blank" rel="noopener" onclick="recordClick('${vid}','${item.cid}')">
          <span class="song-num">${i + 1}</span>
          <span class="song-name">${escapeHtml(item.song)}</span>
          ${badge}
          ${dateStr}
          <span class="song-link-icon">→</span>
        </a>`;
    }).join('');

    if (isCoverGroup) group.classList.add('is-cover');

    group.innerHTML = `
      <div class="channel-header">
        <div class="channel-avatar">${escapeHtml(initial)}</div>
        <div class="channel-name">${escapeHtml(info.name)}</div>
        <div class="channel-count-badge">${items.length}</div>
      </div>
      <div class="song-list">${songsHtml}</div>
    `;

    body.appendChild(group);
    delay += 60;
  }
}

function showAllChannels() {
  const section = document.getElementById('resultsSection');
  const body = document.getElementById('resultsBody');
  const title = document.getElementById('resultsTitle');
  const count = document.getElementById('resultsCount');

  const sorted = Object.entries(vtuberData).sort((a, b) =>
    (channelTotalClicks[b[0]] || 0) - (channelTotalClicks[a[0]] || 0)
  );

  section.style.display = 'block';
  title.textContent = L().channelListTitle;
  count.textContent = sorted.length;

  body.innerHTML = sorted.map(([id, info], i) => `
    <div class="channel-group" style="animation-delay:${i * 30}ms">
      <div class="channel-header" style="border-radius:12px">
        <div class="channel-avatar">${escapeHtml(info.name.charAt(0).toUpperCase())}</div>
        <div class="channel-name">${escapeHtml(info.name)}</div>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text-faint)">${escapeHtml(id)}</span>
      </div>
    </div>
  `).join('');
}

// ============================================================
// STATUS
// ============================================================

function showStatus(msg, spinner = false) {
  document.getElementById('statusText').textContent = msg;
  document.getElementById('spinner').style.display = spinner ? 'block' : 'none';
  const bar = document.getElementById('statusBar');
  bar.classList.add('visible');
}

function hideStatus() {
  document.getElementById('statusBar').classList.remove('visible');
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
